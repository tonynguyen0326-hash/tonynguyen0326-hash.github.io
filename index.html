<!DOCTYPE html>
<html>
    <head>
        <title>ENGO 551 Lab 5</title>

        <!-- include Leaflet CSS file -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

        <!-- style for map -->
         <style>
            #map {
                height: 500px;
                width: 100%;
            }
         </style>

        <!-- encode for reading degree symbol -->
        <meta charset="UTF-8">
    
    </head>

    <body>
        <!-- map element -->
        <div id="map"></div><br>

        <!-- include Leaflet JavaScript file -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

        <!-- include Paho JS Library tag -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

        <!-- include own JS file -->
        <script src="script.js"></script>

        <!-- create input for broker host and port -->
        <label>Broker Host</label>
        <input type="text" id="host" placeholder="Please enter broker host."><br><br>

        <label>Port</label>
        <input type="number" id="port" placeholder="Please enter port number."><br><br>

        <!-- add Start/End buttons -->
        <button onclick="startConnect()">Start</button>
        <button onclick="endConnect()">End</button>

        <br><br><br>

        <!-- add area for typing topics and messages, disabled before host and port chosen -->
        <label>Topic</label>
        <input type="text" id="topic" placeholder="Enter/your/topic." disabled><br><br>

        <label>Message</label>
        <input type="text" id="message" placeholder="Enter your message." disabled><br><br>
        
        <button onclick="publishMessage()" id="PublishButton" disabled>Publish!</button><br><br>

        <!-- add button for sharing status -->
        <button onclick="shareStatus()" id="StatusButton" disabled>Share My Status!</button>

    </body>

</html>
